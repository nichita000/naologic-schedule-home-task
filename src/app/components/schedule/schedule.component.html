<div class="schedule" [class.schedule--interactions-locked]="interactionsLocked()">
  <nao-schedule-sidebar
    [workCenters]="workCenters()"
    [hoveredRowId]="hoveredRowId()"
    [locked]="interactionsLocked()"
    (rowHover)="setHoveredRow($event)"
  />

  <div class="schedule__canvas">
    <div class="schedule__timeline-scroll" #timelineScroll (scroll)="onTimelineScroll($event)">
      <div class="schedule__timeline-track" [style.width.px]="timelineWidth()">
        @if (currentMarker(); as marker) {
          <div
            class="schedule__current"
            [style.transform]="'translateX(' + marker.left + 'px)'"
          >
            <span class="schedule__current-pill">{{ marker.label }}</span>
          </div>
        }

        <nao-schedule-ruler
          [scale]="rulerScale()"
          [startDate]="timelineStartDate()"
          [endDate]="timelineEndDate()"
          [scrollable]="false"
          [renderWindow]="renderWindow()"
        />

        <div class="schedule__gantt-space">
          <nao-schedule-grid
            [cells]="visibleTimelineCells()"
            [timelineWidth]="timelineWidth()"
            [currentMarker]="currentMarker()"
          />

          @for (wc of workCenters(); track wc.id) {
            <nao-schedule-row
              [workCenter]="wc"
              [bars]="normalPlacedByCenter()[wc.id]"
              [compactGroups]="compactGroupsByCenter()[wc.id]"
              [hoverPlacement]="hoverPlacement()"
              [focusedOrderId]="visibleFocusedOrderId()"
              [activeGroupId]="activeCompactGroupId()"
              [compactPopoverFlip]="compactPopoverFlip()"
              [compactPopoverMaxWidth]="compactPopoverMaxWidth()"
              [hovered]="hoveredRowId() === wc.id"
              [locked]="interactionsLocked()"
              [showAddPill]="!activeCompactGroupId() && hoveredRowId() === wc.id"
              (rowMove)="onRowMove($event, wc.id)"
              (rowLeave)="clearHover()"
              (orderAction)="onRowOrderAction($event)"
              (addWorkOrder)="onAddWorkOrder(wc.id)"
              (compactToggle)="onCompactToggle($event)"
              (compactFocus)="focusCompactOrder($event)"
            />
          }
        </div>
      </div>
    </div>
  </div>
</div>
