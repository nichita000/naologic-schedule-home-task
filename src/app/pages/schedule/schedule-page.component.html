<!-- ─── TOP BAR ────────────────────────────────────────────────── -->
<header class="nao-topbar">
  <img class="nao-topbar__logo" src="assets/naologic-logo.svg" alt="Naologic" />
</header>

<!-- ─── PAGE ───────────────────────────────────────────────────── -->
<main class="nao-page">
  <h1 class="nao-page__title">Work Orders</h1>

  <div class="nao-page__toolbar">
    <div class="nao-page__toolbar-controls">
      <nao-timescale [value]="timescale()" (valueChange)="setTimescale($event)" />
      <button class="nao-page__today" type="button" (click)="focusToday()">
        Today
      </button>
    </div>
    <span
      class="nao-page__preview-range"
      [class.nao-page__preview-range--visible]="addPreviewRange() || timelineLoadingSide()"
      [class.nao-page__preview-range--loading]="timelineLoadingSide()"
      aria-live="polite"
      aria-atomic="true"
    >
      @if (timelineLoadingSide()) {
        <span class="nao-page__preview-spinner" role="status" aria-label="Loading work orders"></span>
      } @else if (addPreviewRange()) {
        @for (_ of [addPreviewRangeKey()]; track _) {
          <span class="nao-page__preview-range-text">
            {{ formatAddPreviewRange() }}
          </span>
        }
      }
    </span>
  </div>

  <nao-schedule
    [workCenters]="workCenters()"
    [workOrders]="workOrders()"
    [scale]="timescale()"
    [timelineStartDate]="timelineStartDate()"
    [timelineEndDate]="timelineEndDate()"
    [focusDate]="focusDate()"
    [focusRequestId]="focusRequestId()"
    [focusedOrderId]="focusedOrderId()"
    [timelineLoadingSide]="timelineLoadingSide()"
    (addWorkOrder)="openCreate($event)"
    (addPreviewRangeChange)="setAddPreviewRange($event)"
    (orderAction)="handleOrderAction($event)"
    (compactOrderFocus)="focusCompactOrder($event)"
    (timelineEdgeReached)="extendTimeline($event)"
  />
</main>

@if (deleteTarget(); as order) {
  <nao-work-order-delete-dialog
    [order]="order"
    (confirmed)="confirmDelete()"
    (cancelled)="cancelDelete()"
  />
}

@if (drawerOpen()) {
  <nao-work-order-drawer
    [mode]="drawerMode()"
    [value]="drawerValue()"
    [workCenters]="workCenters()"
    [existingOrders]="workOrders()"
    (closed)="closeDrawer()"
    (saved)="saveDrawer($event)"
  />
}
