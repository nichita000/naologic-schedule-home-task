<main class="schedule-page">
  <img class="schedule-page__logo" src="assets/naologic-logo.svg" alt="Naologic" />

  <section class="schedule-page__content">
    <h1 class="schedule-page__title">Work Orders</h1>

    <div class="schedule-page__toolbar">
      <div class="schedule-page__toolbar-controls">
        <nao-timescale [value]="timescale()" (valueChange)="setTimescale($event)" />
        <button class="schedule-page__today" type="button" (click)="focusToday()">
          Today
        </button>
      </div>

      <span
        class="schedule-page__preview-range"
        [class.schedule-page__preview-range--visible]="addPreviewRange()"
        aria-live="polite"
        aria-atomic="true"
      >
        @if (addPreviewRange()) {
          @for (_ of [addPreviewRangeKey()]; track _) {
            <span class="schedule-page__preview-range-text">
              {{ formatAddPreviewRange() }}
            </span>
          }
        }
      </span>
    </div>

    <div class="schedule-page__schedule">
      <nao-schedule
        [workCenters]="workCenters()"
        [workOrders]="workOrders()"
        [scale]="timescale()"
        [timelineStartDate]="timelineStartDate"
        [timelineEndDate]="timelineEndDate"
        [focusDate]="focusDate()"
        [focusRequestId]="focusRequestId()"
        [focusedOrderId]="focusedOrderId()"
        (addWorkOrder)="openCreate($event)"
        (addPreviewRangeChange)="setAddPreviewRange($event)"
        (orderAction)="handleOrderAction($event)"
        (compactOrderFocus)="focusCompactOrder($event)"
      />
    </div>
  </section>
</main>

@if (deleteTarget(); as order) {
  <nao-work-order-delete-dialog
    [order]="order"
    (confirmed)="confirmDelete()"
    (cancelled)="cancelDelete()"
  />
}

@if (drawerOpen()) {
  <nao-work-order-drawer
    [mode]="drawerMode()"
    [value]="drawerValue()"
    [workCenters]="workCenters()"
    [existingOrders]="workOrders()"
    (closed)="closeDrawer()"
    (saved)="saveDrawer($event)"
  />
}
